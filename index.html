      position: relative;

    .dashboard-wrapper {
      width: 2760px;
      height: 1440px;

      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transform-origin: center center;
      overflow: hidden;

      display: grid;
      grid-template-columns: 540px 815px 836px;
      column-gap: 115px;

      position: absolute;
      top: 245px;
      left: 77px;
      width: 2409px;
      height: 1035px;
      pointer-events: none;
      /* Let clicks pass to widgets */
    }

    .ev-grid-column {
      display: flex;
      flex-direction: column;
      pointer-events: auto;
      /* Enable clicks inside widgets */
    }

      gap: 80px;
      padding-top: 0px;

    }

      gap: 80px;
      padding-top: 0px;
      /* Aligned top card to top:245px by container position */
    }

      /* Aligned top card to top:245px by container position */

      to {
        opacity: 1;

      animation: slideUp 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);

    @keyframes slideUp {
      from {

        opacity: 0;

      to {

      right: 30px;

      height: 50px;

      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #495057;
      transition: all 0.2s;

    .modal-close-btn:hover {
      background: #e9ecef;
      transform: scale(1.05);

    .diag-item {

      padding: 16px 24px;

      border-radius: 16px;

    .charging-station-active {

      border-radius: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    /* SOS Beacon Pulsing Ring animation */
    @keyframes sos-pulsing {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.5);
      }

      70% {
        box-shadow: 0 0 0 20px rgba(255, 59, 48, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 59, 48, 0);
      }
    }

    @keyframes ac-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .pulse-sos {
      animation: sos-pulsing 2s infinite !important;
    }

    /* Slide down notification keyframes */
    @keyframes slideDownNotification {
      0% {
        transform: translate(-50%, -150%);
        opacity: 0;
      }

      100% {
        transform: translate(-50%, 0);
        opacity: 1;
      }

    .dashboard-notification-banner {
      animation: slideDownNotification 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;

    /* --- PREMIUM MATTE SLATE-GREY DARK MODE OVERRIDES (FOLLOWS TARGET PALETTE EXACTLY) --- */
    .homepage-light-mode.dark-mode-active {

    /* Widgets background color overrides */

    .dark-mode-active .menu-bar .element,
    .dark-mode-active .menu-bar .span {

    .dark-mode-active .menu-bar .element span.text-wrapper {
      color: #ffffff !important;
    }

    .dark-mode-active .menu-bar .element {
      color: #ffffff !important;

    .dark-mode-active .text-wrapper-18,
    .dark-mode-active .text-wrapper-3,
    .dark-mode-active .text-wrapper-4,
    .dark-mode-active .text-wrapper-5,
    .dark-mode-active .p,
    .dark-mode-active .element-psi,
    .dark-mode-active .element-psi-2,

    .dark-mode-active .front-right,

    .dark-mode-active .rear-right,
    .dark-mode-active .estimated-range {

    /* Autopilot lane dividers styled to match dark mode */
    .dark-mode-active .tyre-indicator,
    .dark-mode-active .tyre-indicator-2 {

    }

    /* Premium Dark Mode Leaflet Map filter to match target map styling perfectly */
    .dark-mode-active #leaflet-map {
      filter: invert(0.9) hue-rotate(180deg) brightness(0.95) contrast(1.1) !important;
    }

    /* --- PREMIUM TACTILE TOUCH TARGETS & DARK MODE STATUS BAR CONTRAST --- */
    .status-tap-zone {
      width: 52px;
      height: 52px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      position: relative;
      border-radius: 50%;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      background-color: transparent;
      user-select: none;
      pointer-events: auto;
      /* Soft alignment offset to center icons without layout shift */
      margin: 0 -6px;
    }

    /* Pseudo-element that silently inflates click boundaries to ~74px for absolute driver touch accuracy */
    .status-tap-zone::after {
      content: '';
      position: absolute;
      top: -11px;
      bottom: -11px;
      left: -11px;
      right: -11px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }

    .status-tap-zone:hover {
      background-color: rgba(0, 0, 0, 0.05);
    }

    .dark-mode-active .status-tap-zone:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }

    .status-tap-zone:active {
      transform: scale(0.92);
    }

    /* Robust contrast and readability overrides in Dark Mode */
    .dark-mode-active .header-bar {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 8px;
    }

    .dark-mode-active .text-wrapper-19 {
      color: #ffffff !important;

    }

    .dark-mode-active .icon-3 {
      filter: invert(1) brightness(1.2) !important;

    }

    .dark-mode-active .wifi-path,
    .dark-mode-active .wifi-path-2,
    .dark-mode-active .wifi-path-3 {
      filter: invert(1) brightness(1.2) !important;

    }

    .dark-mode-active .wifi-connected-glow {
      filter: invert(1) drop-shadow(0 0 8px #31d33d) brightness(1.3) !important;

    }

    .dark-mode-active .bluetooth-icon {
      filter: invert(1) brightness(1.2) !important;

    .dark-mode-active .bluetooth-connected-glow {

    /* Pulsing radar effect for map scanning */
    @keyframes radar-scan {
      0% {
        stroke-width: 1.5px;
        stroke-opacity: 0.9;
        fill-opacity: 0.05;
        r: 3000;
      }

      50% {
        stroke-width: 3.5px;
        stroke-opacity: 0.4;
        fill-opacity: 0.12;
        r: 3500;
      }

      100% {
        stroke-width: 1.5px;
        stroke-opacity: 0.9;
        fill-opacity: 0.05;
        r: 3000;
      }
    }

    .pulse-radar {
      animation: radar-scan 3s infinite ease-in-out;

    /* Glowing green pin drop animation */
    @keyframes glow-charging {

      }

                  box-shadow: 0 4px 15px rgba(0,0,0,0.15);
                  white-space: nowrap;
                  border: 1px solid #dee2e6;
                ">
                  ${etas.std}
                </div>
              `,
                  iconSize: [80, 36],
                  iconAnchor: [40, 18]
                });
                const mLabel = L.marker(midPoint, { icon: timeLabelIcon }).addTo(map);
                fullscreenMarkersRef.current.push(mLabel);
              }

              map.flyToBounds(customRoute, { padding: [80, 80] });
            }
          }

          const calculatedMinutes = showTraffic && predefinedEtas[name] ? parseInt(predefinedEtas[name].sct) : (predefinedEtas[name] ? parseInt(predefinedEtas[name].std) : (Math.round(Math.random() * 10) + 5));
          setActiveNotification({
            text: `Route Plotted: Navigating to ${name} (${calculatedMinutes} min)`,
            type: "success",
            duration: 4000
          });
          playNotificationChime();
        }
      };

      const respondVoice = (replyText) => {
        setVoiceAssistantText(`Assistant: "${replyText}"`);
        if (window.speechSynthesis) {
          try {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(replyText);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
          } catch (e) {
            console.warn("SpeechSynthesis blocked or failed:", e);
          }
        }
        setActiveNotification({
          text: `🎙️ Assistant: ${replyText}`,
          type: "success",
          duration: 4000
        });
        playNotificationChime();
        setTimeout(() => {
          setActiveNotification(null);
        }, 4000);
      };

      const processVoiceCommand = (commandText) => {
        if (!commandText) return;
        const cmd = commandText.toLowerCase().trim();

        if (cmd.includes("open") && (cmd.includes("frunk") || cmd.includes("front trunk"))) {
          setFrunkOpen(true);
          respondVoice("Opening the front trunk");
        } else if (cmd.includes("close") && (cmd.includes("frunk") || cmd.includes("front trunk"))) {
          setFrunkOpen(false);
          respondVoice("Closing the front trunk");
        } else if (cmd.includes("open") && (cmd.includes("trunk") || cmd.includes("rear trunk") || cmd.includes("boot"))) {
          setTrunkOpen(true);
          respondVoice("Opening the rear trunk");
        } else if (cmd.includes("close") && (cmd.includes("trunk") || cmd.includes("rear trunk") || cmd.includes("boot"))) {
          setTrunkOpen(false);
          respondVoice("Closing the rear trunk");
        } else if (cmd.includes("lock") && cmd.includes("car")) {
          setIsLocked(true);
          respondVoice("Locking the vehicle");
        } else if (cmd.includes("unlock") && cmd.includes("car")) {
          setIsLocked(false);
          respondVoice("Unlocking the vehicle");
        } else if (cmd.includes("open") && (cmd.includes("fuel") || cmd.includes("charge port") || cmd.includes("charging port"))) {
          setChargePortOpen(true);
          respondVoice("Opening the fuel tank cap");
        } else if (cmd.includes("close") && (cmd.includes("fuel") || cmd.includes("charge port") || cmd.includes("charging port"))) {
          setChargePortOpen(false);
          respondVoice("Closing the fuel tank cap");
        } else if (cmd.includes("dark mode") || cmd.includes("night mode") || cmd.includes("theme dark")) {
          setIsDarkMode(true);
          respondVoice("Enabling dark mode");
        } else if (cmd.includes("light mode") || cmd.includes("day mode") || cmd.includes("theme light")) {
          setIsDarkMode(false);
          respondVoice("Enabling light mode");
        } else if (cmd.includes("eco mode") || cmd.includes("energy saving")) {
          setDriveMode('eco');
          setEnergySavingMode(true);
          respondVoice("Switching to Eco drive mode");
        } else if (cmd.includes("sport mode")) {
          setDriveMode('sport');
          setEnergySavingMode(false);
          respondVoice("Switching to Sport drive mode");
        } else if (cmd.includes("compact mode")) {
          setDriveMode('compact');
          setEnergySavingMode(false);
          respondVoice("Switching to Compact drive mode");
        } else if (cmd.includes("play") && (cmd.includes("music") || cmd.includes("song") || cmd.includes("track"))) {
          setIsPlaying(true);
          respondVoice("Playing music");
        } else if (cmd.includes("pause") || cmd.includes("stop music") || cmd.includes("stop song")) {
          setIsPlaying(false);
          respondVoice("Pausing music");
        } else if (cmd.includes("next") && (cmd.includes("song") || cmd.includes("track"))) {
          handleNextTrack();
          respondVoice("Skipping to next track");
        } else if (cmd.includes("previous") && (cmd.includes("song") || cmd.includes("track"))) {
          handlePrevTrack();
          respondVoice("Playing previous track");
        } else if (cmd.includes("ac on") || cmd.includes("climate on") || cmd.includes("turn on ac")) {
          setAcPower(true);
          setAcLeftOn(true);
          setAcRightOn(true);
          respondVoice("Climate control turned on");
        } else if (cmd.includes("ac off") || cmd.includes("climate off") || cmd.includes("turn off ac")) {
          setAcPower(false);
          setAcLeftOn(false);
          setAcRightOn(false);
          respondVoice("Climate control turned off");
        } else if (cmd.includes("cool down") || cmd.includes("rapid cool") || cmd.includes("cold")) {
          handleRapidCool();
          respondVoice("Enabling rapid cooling");
        } else if (cmd.includes("warm up") || cmd.includes("rapid warm") || cmd.includes("hot")) {
          handleRapidWarm();
          respondVoice("Enabling rapid warming");
        } else if (cmd.includes("navigate to") || cmd.includes("route to")) {
          let dest = "";
          let destId = 0;
          if (cmd.includes("jomcharge") || cmd.includes("jom charge")) { dest = "JomCharge Charging Station"; destId = 1; }
          else if (cmd.includes("bmw")) { dest = "BMW Charging Station"; destId = 2; }
          else if (cmd.includes("chargesini") || cmd.includes("charge sini")) { dest = "ChargeSINI Charging Station"; destId = 3; }

          if (destId > 0) {
            setShowSettingsScreen(false);
            setShowMapModal(true);
            setTimeout(() => drawRouteForStation(destId), 400);
            respondVoice(`Navigating to ${dest}`);
          } else {
            const query = cmd.replace("navigate to", "").replace("route to", "").trim();
            if (query) {
              respondVoice(`Searching map for ${query}`);
              runVoiceNavigationSearch(query);
            } else {
              respondVoice("Please specify a location to navigate to");
            }
          }
        } else if (cmd.includes("volume up") || cmd.includes("louder")) {
          adjustVolume(10);
          respondVoice("Increasing volume");
        } else if (cmd.includes("volume down") || cmd.includes("quieter")) {
          adjustVolume(-10);
          respondVoice("Decreasing volume");
        } else if (cmd.includes("mute")) {
          setIsMuted(true);
          respondVoice("Muting audio");
        } else if (cmd.includes("unmute")) {
          setIsMuted(false);
          respondVoice("Unmuting audio");
        } else {
          respondVoice(`I heard: "${commandText}". Try saying 'open frunk' or 'navigate JomCharge'.`);
        }
      };

      const runVoiceNavigationSearch = (query) => {
        if (!query) return;
        setSearchQuery(query);
        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
          .then(res => res.json())
          .then(data => {
            if (data && data.length > 0) {
              const first = data[0];
              const lat = parseFloat(first.lat);
              const lon = parseFloat(first.lon);
              const displayName = first.display_name;

              const map = showMapModal ? fullscreenMapInstanceRef.current : leafletMapInstanceRef.current;
              if (map) {
                map.flyTo([lat, lon], 15);
                if (searchMarkerRef.current) {
                  map.removeLayer(searchMarkerRef.current);
                }
                searchMarkerRef.current = L.marker([lat, lon]).addTo(map)
                  .bindPopup(`<b>${query}</b><br>${displayName.split(',').slice(0, 2).join(',')}`)
                  .openPopup();
              }
              setActiveDestination(query);
              setNavigationETA(Math.round(Math.random() * 25) + 5);
              setActiveStation(null);
            }
          })
          .catch(err => console.error("Voice navigation search failed:", err));
      };

      const startVoiceAssistant = () => {
        setShowVoiceAssistantModal(true);
        setIsListeningState(true);
        setVoiceAssistantText("Listening for commands... (Say 'open frunk', 'navigate JomCharge', or 'turn on dark mode')");

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          setVoiceAssistantText("Voice commands simulated. Type a command or select a preset below!");
          setIsListeningState(false);
          return;
        }

        try {
          if (voiceRecognitionRef.current) {
            voiceRecognitionRef.current.abort();
          }

          const recognition = new SpeechRecognition();
          recognition.continuous = false;
          recognition.lang = 'en-US';
          recognition.interimResults = false;

          recognition.onstart = () => {
            setIsListeningState(true);
            setVoiceAssistantText("Listening for commands... (Try saying 'open frunk' or 'play music')");
          };

          recognition.onerror = (e) => {
            console.warn("Speech recognition error:", e);
            if (e.error === 'not-allowed') {
              setVoiceAssistantText("Microphone permission denied. Select a preset or type a command below!");
            } else {
              setVoiceAssistantText("Microphone idle. Select a preset or type a command below!");
            }
            setIsListeningState(false);
          };

          recognition.onend = () => {
            setIsListeningState(false);
          };

          recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            processVoiceCommand(transcript);
          };

          recognition.start();
          voiceRecognitionRef.current = recognition;
        } catch (err) {
          console.error("Speech recognition startup failed:", err);
          setVoiceAssistantText("Voice commands ready. Select a preset or type a command below!");
          setIsListeningState(false);
        }
      };

      const stopVoiceAssistant = () => {
        setShowVoiceAssistantModal(false);
        setIsListeningState(false);
        if (voiceRecognitionRef.current) {
          try {
            voiceRecognitionRef.current.abort();
          } catch (e) { }
          voiceRecognitionRef.current = null;
        }
        if (window.speechSynthesis) {
          try {
            window.speechSynthesis.cancel();
          } catch (e) { }
        }
      };

      const triggerRecharge = () => {
        if (!chargePortOpen) {
          setChargePortOpen(true);
        }
        setIsCharging(true);
      };

      const playNotificationChime = () => {
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc1 = audioCtx.createOscillator();
          const osc2 = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();

          osc1.type = 'sine';
          osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
          osc1.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15); // A5

          osc2.type = 'triangle';
          osc2.frequency.setValueAtTime(293.66, audioCtx.currentTime); // D4
          osc2.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15); // A4

          gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.45);

          osc1.connect(gainNode);
          osc2.connect(gainNode);
          gainNode.connect(audioCtx.destination);

          osc1.start();
          osc2.start();

          osc1.stop(audioCtx.currentTime + 0.45);
          osc2.stop(audioCtx.currentTime + 0.45);
        } catch (e) {
          console.warn("AudioContext initialization failed or blocked by autoplay policy:", e);
        }
      };

      // --- AUTOMATIC TICKING DRIVER NOTIFICATIONS (EVERY 30 SECONDS) ---
      React.useEffect(() => {
        const notificationQueue = [
          { text: "🌧️ Heavy rain, please reduce your speed.", type: "warning", duration: 6000 },
          { text: "🔋 Eco saving mode enabled. Extends estimated range.", type: "info", duration: 5000 },
          { text: "⚠️ Low tire pressure warning on Front Left tire.", type: "warning", duration: 6000 },
          { text: "🚘 Autopilot lane assist active.", type: "success", duration: 5000 },
          { text: "❄️ Road icing warning. Temperature is low.", type: "warning", duration: 6000 },
          { text: "⚡ EV Supercharger detected ahead in 2 km.", type: "success", duration: 5000 }
        ];

        let currentIndex = 0;

        const triggerNext = () => {
          const item = notificationQueue[currentIndex];
          setActiveNotification(item);
          playNotificationChime();

          // If the notification is fuel cap related, sync it dynamically with vehicle states!
          if (item.isCapToggle) {
            setChargePortOpen(item.openState);
          }

          // Auto dismiss
          setTimeout(() => {
            setActiveNotification(null);
          }, item.duration);

          currentIndex = (currentIndex + 1) % notificationQueue.length;
        };

        // First popup after 5 seconds of dashboard boot
        const initialDelay = setTimeout(triggerNext, 5000);

        // Repeat every 30 seconds
        const interval = setInterval(triggerNext, 30000);

        return () => {
          clearTimeout(initialDelay);
          clearInterval(interval);
        };
      }, []);

      const selectChargingStation = (stationNum) => {
        setActiveStation(stationNum);
        const stations = {
          1: { name: "Satok Bridge Charging Hub", lat: 1.551, lon: 110.334 },
          2: { name: "North Kuching Charging Hub", lat: 1.564, lon: 110.347 },
          3: { name: "Jalan Satok Charger", lat: 1.547, lon: 110.339 },
          4: { name: "Kuching Waterfront Supercharger", lat: 1.558, lon: 110.342 },
          5: { name: "MBKS Swimming Pool Charger", lat: 1.549, lon: 110.366 }
        };

        const target = stations[stationNum];
        if (target) {
          setActiveDestination(target.name);
          if (leafletMapInstanceRef.current) {
            leafletMapInstanceRef.current.flyTo([target.lat, target.lon], 15);
          }
        } else {
          setActiveDestination(`Tesla Supercharger Station #${stationNum}`);
        }
        setNavigationETA(Math.round(Math.random() * 8) + 2); // 2-10 mins
      };

      // --- DIAGNOSTICS SUITE ---
      const runDiagnosticsSuite = () => {
        setDiagnosticsRunning(true);
        setDiagnosticsResults(null);
        setTimeout(() => {
          setDiagnosticsRunning(false);
          setDiagnosticsResults({
            batteryHealth: "Excellent (98% capacity)",
            cellTemp: "31°C - Nominal",
            motorWear: "Good - 100% efficient",
            tireStatus: tireFL < 35 || tireFR < 35 ? "Warning - Low tire pressure detected" : "All 4 tires at healthy pressure",
            brakes: "92% pad thickness remaining",
            diagnosticsStatus: "All Core Systems Operational - Clean Bill of Health!"
          });
        }, 2000);
      };

      // --- APPS LIST SCROLL AND CLICK HANDLERS ---
      const appsContainerRef = React.useRef(null);

      const handleAppsScroll = (e) => {
        const container = e.target;
        const maxScroll = container.scrollHeight - container.clientHeight;
        if (maxScroll > 0) {
          setAppsSliderValue((container.scrollTop / maxScroll) * 100);
        }
      };

      const handleAppsSliderChange = (e) => {
        const val = parseFloat(e.target.value);
        setAppsSliderValue(val);
        if (appsContainerRef.current) {
          const container = appsContainerRef.current;
          const maxScroll = container.scrollHeight - container.clientHeight;
          container.scrollTop = (val / 100) * maxScroll;
        }
      };

      const handleAppClick = (appId) => {
        switch (appId) {
          case "apps":
            alert("Already viewing the Apps List cockpit!");
            break;
          case "carplay":
            setActiveAppPopup("carplay");
            break;
          case "android_auto":
            setActiveAppPopup("android_auto");
            break;
          case "map":
            setShowAppsList(false);
            setShowMapModal(true);
            break;
          case "phone":
            setActiveAppPopup("phone");
            setDialedDigits("");
            setCallState("idle");
            break;
          case "calendar":
            setActiveAppPopup("calendar");
            break;
          case "usb_music":
            setActiveAppPopup("usb_music");
            break;
          case "qibla":
            setActiveAppPopup("qibla");
            break;
          case "radio":
            setActiveAppPopup("radio");
            setRadioIsPlaying(false);
            break;
          case "bluetooth_music":
            setActiveAppPopup("bluetooth_music");
            break;
          case "netflix":
            setActiveAppPopup("netflix");
            break;
          case "photos":
            setActiveAppPopup("photos");
            break;
          case "energy":
            setShowAppsList(false);
            setShowSettingsScreen(false);
            setShowClimateScreen(false);
            setShowEnergyScreen(true);
            break;
          case "spotify":
            setActiveAppPopup("spotify");
            break;
          case "vehicle_settings":
            setShowAppsList(false);
            setShowSettingsScreen(true);
            setActiveSettingsTab("Shortcuts");
            break;
          case "security":
            setActiveAppPopup("security");
            break;
          case "gamebox":
            setActiveAppPopup("gamebox");
            setGameState(Array(9).fill(null));
            setIsXNext(true);
            break;
          case "chrome":
            setActiveAppPopup("chrome");
            setChromeSearchSubmitted(false);
            setChromeSearchQuery("");
            break;
          default:
            break;
        }
      };

      // --- REAL-TIME CHARGING STATION STATS HELPER ---
      const getStationStats = (distKm, timeMins) => {
        // Current Estimated Range
        const currentEstRange = Math.round(battery * rangeFactor);

        // Battery consumed: 0.3% per km
        const batConsumed = parseFloat((distKm * 0.3).toFixed(1));
        const finalBattery = parseFloat((Math.max(0, battery - batConsumed)).toFixed(1));

        // Fuel Equiv: 0.025 L per km (representing hybrid mode fuel savings efficiency)
        const fuelConsumed = parseFloat((distKm * 0.025).toFixed(2));

        // Electricity Energy: 0.16 kWh per km
        const energyConsumed = parseFloat((distKm * 0.16).toFixed(1));

        // Clock ETA Time: Add travel time to current time
        let clockETA = "";
        try {
          const now = new Date();
          now.setMinutes(now.getMinutes() + timeMins);
          const hh = String(now.getHours()).padStart(2, '0');
          const mm = String(now.getMinutes()).padStart(2, '0');
          clockETA = `${hh}:${mm}`;
        } catch (e) {
          clockETA = "--:--";
        }

        return {
          batteryConsumed: batConsumed,
          batteryRemaining: finalBattery,
          fuelConsumed: fuelConsumed,
          energyConsumed: energyConsumed,
          etaTime: clockETA,
          remainingRange: currentEstRange
        };
      };

      return (
        <div className="dashboard-wrapper" style={{ transform: `translate(-50%, -50%) scale(${scale})` }}>
          <div className={`homepage-light-mode ${isDarkMode ? 'dark-mode-active' : ''}`} style={{
            background: isDarkMode
              ? '#383941'
              : 'linear-gradient(0deg, rgba(110, 98, 237, 0.2) 0%, rgba(247, 233, 233, 0.2) 100%), linear-gradient(0deg, #ffffff 0%, #ffffff 100%)',
            transition: 'all 0.5s ease',
            filter: isLocked ? 'none' : 'drop-shadow(0 0 10px rgba(0,0,0,0.05))'
          }}>

            {/* --- DYNAMIC DRIVER NOTIFICATION POPUP BANNER --- */}
            {activeNotification && (
              <div
                className="dashboard-notification-banner"
                style={{
                  position: 'absolute',
                  top: '80px',
                  left: '50%',
                  transform: 'translateX(-50%)',
                  backgroundColor: isDarkMode ? '#232535' : '#e5e5e5',
                  border: `1.5px solid ${isDarkMode ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.1)'}`,
                  borderRadius: '25px',
                  padding: '16px 60px',
                  minWidth: '850px',
                  textAlign: 'center',
                  boxShadow: isDarkMode ? '0 12px 40px rgba(0,0,0,0.45)' : '0 8px 30px rgba(0,0,0,0.18)',
                  zIndex: 9999,
                  display: 'flex',
                  justifyContent: 'center',
                  alignItems: 'center',
                  boxSizing: 'border-box'
                }}
              >
                <span style={{
                  fontSize: '28px',
                  fontWeight: '700',
                  fontFamily: 'Montserrat, sans-serif',
                  color: isDarkMode ? '#ffffff' : '#111111',
                  letterSpacing: '-0.32px'
                }}>
                  {activeNotification.text}
                </span>
              </div>
            )}

            {/* --- TOP STATUS BAR --- */}
            <div className="header-bar">
              <div className="top-bar-left">
                {/* Inline color binds ensure robust black text rendering */}
                <div className="time" style={{ color: isDarkMode ? '#ffffff' : '#000000', display: 'inline-block' }}>{timeStr}</div>
                <div className="day" style={{ color: isDarkMode ? '#ffffff' : '#000000', display: 'inline-block' }}>{dayStr}</div>

                <div className="signal-icon interactive-button-hover" onClick={() => setSignal5G(!signal5G)} style={{ opacity: signal5G ? 1 : 0.3 }} title="Toggle 5G Connection">
                  <div className="text-wrapper-19" style={{ color: isDarkMode ? '#ffffff' : '#000000' }}>5G</div>
                  <img className="icon-3" src="img/icon.svg" style={{ filter: isDarkMode ? 'invert(1) brightness(1.2)' : 'none' }} />
                </div>

                <div className="status-tap-zone" onClick={() => setShowBluetoothModal(true)} title="Configure Bluetooth Devices">
                  <img
                    className="bluetooth-icon"
                    src="img/bluetooth-icon.svg"
                    style={{
                      filter: !isBluetoothOn
                        ? 'grayscale(100%) opacity(0.2)'
                        : !bluetoothConnected
                          ? (isDarkMode ? 'invert(1) grayscale(100%) opacity(0.55)' : 'grayscale(100%) opacity(0.55)')
                          : (isDarkMode ? 'invert(1) drop-shadow(0 0 8px #00a2ff) brightness(1.3)' : 'drop-shadow(0 0 8px #00a2ff) brightness(1.1)'),
                      transition: 'all 0.3s ease',
                      pointerEvents: 'none'
                    }}
                  />
                </div>

                <div className="status-tap-zone" onClick={() => setShowWifiModal(true)} title="Configure Wi-Fi Networks">
                  <div
                    className="wifi-icon"
                    style={{
                      opacity: !isWifiOn
                        ? 0.2
                        : !wifiConnected
                          ? 0.55
                          : 1,
                      filter: !isWifiOn
                        ? 'grayscale(100%) opacity(0.2)'
                        : !wifiConnected
                          ? (isDarkMode ? 'invert(1) opacity(0.55)' : 'opacity(0.55)')
                          : (isDarkMode ? 'invert(1) drop-shadow(0 0 8px #31d33d) brightness(1.3)' : 'drop-shadow(0 0 8px #31d33d) brightness(1.1)'),
                      transition: 'all 0.3s ease',
                      pointerEvents: 'none'
                    }}
                  >
                    <img className="wifi-path" src="img/wifi-path.svg" />
                    <img className="wifi-path-2" src="img/wifi-path-1.svg" />
                    <img className="wifi-path-3" src="img/wifi-path-2.svg" />
                  </div>
                </div>

                {/* Charge plug symbol indicator */}
                <div className="status-tap-zone" onClick={triggerRecharge} title="Open Charge Port / Recharge">
                  <div className="fuel-tank-indicator" style={{ pointerEvents: 'none' }}>
                    <div className="indicator">
                      <img className={`vector-14 ${isCharging ? 'pulse-active' : ''}`} src="img/vector-49.svg" style={{ filter: isDarkMode ? 'invert(1)' : 'none' }} />
                      <div className="text-wrapper-20" style={{ color: isCharging ? '#02ff15' : (isDarkMode ? '#ffffff' : '#1e1e1e') }}>{isCharging ? "⚡" : "!"}</div>
                    </div>
                    <img className="rectangle-10" src="img/rectangle.png" style={{ filter: (isCharging ? 'hue-rotate(90deg) saturate(1.5) ' : '') + (isDarkMode ? 'invert(1) brightness(1.2)' : 'none') }} />
                  </div>
                </div>
              </div>

              <div className="top-bar-right">
                <div className="status-tap-zone" onClick={() => {
                  const nextVal = !isDarkMode;
                  setIsDarkMode(nextVal);
                  setWeather(nextVal ? "night" : "sunny");
                }} title="Toggle Dark/Night Mode">
                  <div className="img-2" style={{ pointerEvents: 'none', display: 'flex', justifyContent: 'center', alignItems: 'center' }}>
                    <img className="subtract-3" src="img/subtract.svg" style={{ filter: isDarkMode ? 'invert(1) drop-shadow(0 0 8px #ffffff) brightness(1.3)' : 'none' }} />
                  </div>
                </div>

                <div className="status-tap-zone" onClick={() => {
                  setIsDarkMode(false);
                  setWeather("sunny");
                }} title="Toggle Light/Sunny Mode">
                  <img
                    className="sun-fill"
                    src="img/sun-fill.png"
                    style={{
                      filter: isDarkMode ? 'opacity(0.3)' : 'drop-shadow(0 0 8px #ffb300) brightness(1.2)',
                      pointerEvents: 'none'
                    }}
                  />
                </div>

                <div className="status-tap-zone" onClick={startVoiceAssistant} title="Voice Command Assistant">

                                  Detailed reviews and geocoded coordinates of premium Sarawak JomCharge and ChargeSINI stations. Find the ultimate 22kW and 180kW DC fast chargers in Kuching with real-time ETA telemetry.
                                </p>
                              </div>

                              <div style={{ borderBottom: '1px solid #eee', paddingBottom: '20px' }}>
                                <span style={{ fontSize: '14px', color: '#202124', display: 'block', marginBottom: '4px' }}>https://sarawakenergy.com > ev-drive</span>

                                  Sarawak Energy Green Telemetry & Charging Highway Infrastructure
                                </h3>
                                <p style={{ margin: 0, fontSize: '16px', color: '#4d5156', lineHeight: '1.4' }}>
                                  Discover how Sarawak is installing hundreds of smart high-voltage charging poles along the Pan-Borneo highway to support electric vehicle driving modes and range optimization checks.
                                </p>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                </div>
              </div>
            </div>
          )}

          {/* --- FULL SCREEN ENERGY SCREEN (Battery and Charge) --- */}
          {showEnergyScreen && (
            <div style={{
              position: 'absolute',
              top: '129px',
              left: '0',
              width: '2560px',
              height: '1182px',
              backgroundColor: isDarkMode ? '#11121a' : '#ffffff',
              display: 'flex',
              flexDirection: 'column',
              alignItems: 'center',
              padding: '50px 120px 60px 120px',
              color: isDarkMode ? '#ffffff' : '#333333',
              fontFamily: 'Inter, sans-serif',
              zIndex: 101,
              animation: 'fadeIn 0.4s ease-out',
              boxSizing: 'border-box'
            }}>
              {/* Title Header */}
              <h1 style={{
                fontSize: '54px',
                fontWeight: '600',
                color: isDarkMode ? '#ffffff' : '#1e1e1e',
                fontFamily: 'Montserrat, sans-serif',
                letterSpacing: '1px',
                marginTop: '10px',
                marginBottom: '35px',
                textAlign: 'center'
              }}>
                Battery and Charge
              </h1>

              {/* Content Columns */}
              <div style={{
                display: 'flex',
                width: '100%',
                flex: 1,
                gap: '120px',
                alignItems: 'center',
                justifyContent: 'center',
                boxSizing: 'border-box'
              }}>

                {/* Left Column: Car Model & Battery Telemetry */}
                <div style={{
                  flex: '0 0 45%',
                  display: 'flex',
                  flexDirection: 'column',
                  alignItems: 'center',
                  justifyContent: 'center',
                  boxSizing: 'border-box'
                }}>
                  <img
                    src="img/white-tesla-model.png"
                    style={{
                      width: '780px',
                      objectFit: 'contain',
                      marginBottom: '45px',
                      filter: isDarkMode ? 'brightness(0.9) drop-shadow(0 10px 20px rgba(0,0,0,0.3))' : 'drop-shadow(0 15px 30px rgba(0,0,0,0.1))'
                    }}
                  />

                  {/* Battery Meter Panel */}
                  <div style={{ width: '100%', maxWidth: '650px', boxSizing: 'border-box' }}>
                    <span style={{
                      fontSize: '85px',
                      fontWeight: '800',
                      fontFamily: 'Montserrat, sans-serif',
                      color: isDarkMode ? '#ffffff' : '#111111',
                      display: 'block',
                      marginBottom: '15px'
                    }}>
                      {Math.round(battery)}%
                    </span>

                    {/* Progress bar */}
                    <div style={{
                      width: '100%',
                      height: '18px',
                      backgroundColor: isDarkMode ? '#232535' : '#e9ecef',
                      borderRadius: '9px',
                      overflow: 'hidden',
                      marginBottom: '30px',
                      border: isDarkMode ? '1px solid rgba(255,255,255,0.05)' : 'none'
                    }}>
                      <div style={{
                        width: `${battery}%`,
                        height: '100%',
                        backgroundColor: battery < 20 ? '#ff3b30' : '#ffb300',
                        borderRadius: '9px',
                        transition: 'width 0.4s ease'
                      }}></div>
                    </div>

                    {/* Telemetry rows */}
                    <div style={{
                      display: 'grid',
                      gridTemplateColumns: '1fr 1fr',
                      rowGap: '20px',
                      columnGap: '40px',
                      width: '100%',
                      fontSize: '25px',
                      color: isDarkMode ? '#a0aec0' : '#666666',
                      fontWeight: '500'
                    }}>
                      <div>Power: <strong style={{ color: isDarkMode ? '#fff' : '#111' }}>{isCharging ? "15.0 kW" : "0.0 kW"}</strong></div>
                      <div>Voltage: <strong style={{ color: isDarkMode ? '#fff' : '#111' }}>305.0 V</strong></div>
                      <div>Current: <strong style={{ color: isDarkMode ? '#fff' : '#111' }}>{isCharging ? "173.6 A" : "0.0 A"}</strong></div>
                    </div>
                  </div>
                </div>

                {/* Right Column: Interactive Charging Controls */}
                <div style={{
                  flex: '0 0 45%',
                  display: 'flex',
                  flexDirection: 'column',
                  alignItems: 'flex-start',
                  justifyContent: 'center',
                  boxSizing: 'border-box'
                }}>

                  {/* Odometer, Battery Icon, & Regen button row */}
                  <div style={{ display: 'flex', alignItems: 'center', gap: '30px', marginBottom: '45px', width: '100%' }}>
                    <div style={{ display: 'flex', alignItems: 'baseline' }}>
                      <span style={{
                        fontSize: '140px',
                        fontWeight: '800',
                        lineHeight: '1',
                        fontFamily: 'Montserrat, sans-serif',
                        color: isDarkMode ? '#ffffff' : '#111111'
                      }}>
                        {estimatedRange}
                      </span>
                      <span style={{
                        fontSize: '40px',
                        fontWeight: '700',
                        marginLeft: '10px',
                        color: isDarkMode ? '#a0aec0' : '#111111'
                      }}>
                        km
                      </span>
                    </div>

                    {/* Dynamic Battery Shell */}
                    <div style={{
                      width: '90px',
                      height: '46px',
                      border: `3.5px solid ${isDarkMode ? '#a0aec0' : '#666666'}`,
                      borderRadius: '8px',
                      padding: '3px',
                      position: 'relative',
                      display: 'flex',
                      alignItems: 'center'
                    }}>
                      <div style={{
                        width: `${Math.max(12, battery)}%`,
                        height: '100%',
                        backgroundColor: battery < 20 ? '#ff3b30' : '#31d33d',
                        borderRadius: '3px'
                      }}></div>
                      <div style={{
                        position: 'absolute',
                        right: '-11px',
                        top: '50%',
                        transform: 'translateY(-50%)',
                        width: '7px',
                        height: '16px',
                        backgroundColor: isDarkMode ? '#a0aec0' : '#666666',
                        borderRadius: '0 3px 3px 0'
                      }}></div>
                    </div>

                    {/* Standard grey button */}
                    <button
                      onClick={() => {
                        const newPref = regenPreference === "Standard" ? "Low" : "Standard";
                        setRegenPreference(newPref);
                      }}
                      className="interactive-button-hover"
                      style={{
                        display: 'flex',
                        alignItems: 'center',
                        gap: '12px',
                        padding: '18px 36px',
                        backgroundColor: isDarkMode ? '#232535' : '#aeaeae',
                        color: isDarkMode ? '#ffffff' : '#111111',
                        border: isDarkMode ? '1px solid rgba(255,255,255,0.1)' : 'none',
                        borderRadius: '20px',
                        fontSize: '26px',
                        fontWeight: 'bold',
                        cursor: 'pointer',
                        boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
                        marginLeft: 'auto'
                      }}
                    >
                      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                        <polyline points="23 4 23 10 17 10" />
                        <polyline points="1 20 1 14 7 14" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                      </svg>
                      <span>{regenPreference}</span>
                    </button>
                  </div>

                  {/* Charging Info Display */}
                  <div style={{ display: 'flex', flexDirection: 'column', gap: '25px', width: '100%', alignItems: 'flex-start' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '15px', fontSize: '32px', fontWeight: '600' }}>
                      {isCharging ? (
                        <>
                          <span style={{ color: '#31d33d', fontSize: '42px' }}>⚡</span>
                          <span style={{ color: isDarkMode ? '#fff' : '#111' }}>Charging in progress.</span>
                        </>
                      ) : (
                        <>
                          <span style={{ color: '#8e8e93', fontSize: '42px' }}>🔌</span>
                          <span style={{ color: isDarkMode ? '#fff' : '#111' }}>Ready to charge.</span>
                        </>
                      )}
                    </div>

                    <div style={{ fontSize: '26px', color: isDarkMode ? '#a0aec0' : '#666666', fontWeight: '500' }}>
                      {isCharging ? (
                        <span>Remaining time: {Math.max(10, Math.round((chargeLimit - battery) * 1.8))} minutes</span>
                      ) : (
                        <span>Plug-in or click toggle to charge battery.</span>
                      )}
                    </div>

                    {/* Toggle Charging Button */}
                    <button
                      onClick={isCharging ? () => setIsCharging(false) : triggerRecharge}
                      className="interactive-button-hover"
                      style={{
                        padding: '24px 75px',
                        backgroundColor: isCharging ? '#ff453a' : '#30d760',
                        color: '#ffffff',
                        border: 'none',
                        borderRadius: '20px',
                        fontSize: '30px',
                        fontWeight: 'bold',
                        cursor: 'pointer',
                        boxShadow: '0 6px 22px rgba(0,0,0,0.18)',
                        transition: 'all 0.2s',
                        marginTop: '10px'
                      }}
                    >
                      {isCharging ? "Stop Charging" : "Start Charging"}
                    </button>
                  </div>

                  {/* Charging Limit Slider Panel */}
                  <div style={{ width: '100%', marginTop: '45px', borderTop: `1.5px solid ${isDarkMode ? 'rgba(255,255,255,0.1)' : '#eee'}`, paddingTop: '40px' }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '15px' }}>
                      <span style={{ fontSize: '26px', fontWeight: '600', color: isDarkMode ? '#fff' : '#111' }}>Charge Limit</span>
                      <strong style={{ fontSize: '32px', color: '#2f80ed' }}>{chargeLimit}%</strong>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: '25px', marginBottom: '15px' }}>
                      <span style={{ fontSize: '20px', color: '#888' }}>50%</span>
                      <input
                        type="range"
                        min="50"
                        max="100"
                        value={chargeLimit}
                        onChange={e => setChargeLimit(parseInt(e.target.value))}
                        style={{
                          flex: 1,
                          height: '10px',
                          borderRadius: '5px',
                          outline: 'none',
                          cursor: 'pointer',
                          accentColor: '#30d760'
                        }}
                      />
                      <span style={{ fontSize: '20px', color: '#888' }}>100%</span>
                    </div>
                    <p style={{ fontSize: '18px', color: '#8e8e93', marginTop: '10px', margin: 0, lineHeight: '1.4' }}>
                      Daily driving recommended at 80% limit to maintain battery lifespan health. Increase to 100% for long road trips.
                    </p>
                  </div>

                  {/* Energy Optimization Switch Option */}
                  <div style={{
                    width: '100%',
                    marginTop: '30px',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    backgroundColor: isDarkMode ? '#232535' : '#f8f9fa',
                    padding: '22px 30px',
                    borderRadius: '20px',
                    border: `1px solid ${isDarkMode ? 'rgba(255,255,255,0.05)' : '#eee'}`
                  }}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                      <span style={{ fontSize: '31px', fontWeight: 'bold', color: isDarkMode ? '#fff' : '#111' }}>Optimize Energy Saving Mode</span>
                      <span style={{ fontSize: '23px', color: '#8e8e93' }}>Extends driving range by optimizing climate and drive systems</span>
                    </div>

                    {/* Premium switch toggle slider */}
                    <div
                      onClick={() => setEnergySavingMode(!energySavingMode)}
                      className="interactive-button-hover"
                      style={{
                        width: '110px',
                        height: '56px',
                        borderRadius: '28px',
                        backgroundColor: energySavingMode ? '#30d760' : '#ced4da',
                        position: 'relative',
                        cursor: 'pointer',
                        transition: 'background-color 0.25s'
                      }}
                    >
                      <div style={{
                        width: '46px',
                        height: '46px',
                        borderRadius: '23px',
                        backgroundColor: '#ffffff',
                        position: 'absolute',
                        top: '5px',
                        left: energySavingMode ? '59px' : '5px',
                        transition: 'left 0.25s cubic-bezier(0.2, 0.85, 0.32, 1.2)',
                        boxShadow: '0 2px 5px rgba(0,0,0,0.2)'
                      }} />
                    </div>
                  </div>

                  {/* Protective Shutdown Switch Option */}
                  <div style={{
                    width: '100%',
                    marginTop: '20px',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    backgroundColor: isDarkMode ? '#232535' : '#f8f9fa',
                    padding: '22px 30px',
                    borderRadius: '20px',
                    border: `1px solid ${isDarkMode ? 'rgba(255,255,255,0.05)' : '#eee'}`
                  }}>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                      <span style={{ fontSize: '31px', fontWeight: 'bold', color: isDarkMode ? '#fff' : '#111' }}>Protective Shutdown</span>
                      <span style={{ fontSize: '23px', color: '#8e8e93' }}>Safeguards high-voltage battery pack from thermal runaway or extreme discharge</span>
                    </div>

                    {/* Premium switch toggle slider */}
                    <div
                      onClick={() => {
                        const nextVal = !protectiveShutdown;
                        setProtectiveShutdown(nextVal);
                        playNotificationChime();
                        if (nextVal) {
                          setActiveNotification({
                            text: "🛡️ Protective Shutdown Enabled: Battery safeguards primed for critical load isolation.",
                            type: "warning",
                            duration: 5000
                          });
                        } else {
                          setActiveNotification({
                            text: "Protective Shutdown Disabled. Standard battery protection active.",
                            type: "info",
                            duration: 4000
                          });
                        }
                      }}
                      className="interactive-button-hover"
                      style={{
                        width: '110px',
                        height: '56px',
                        borderRadius: '28px',
                        backgroundColor: protectiveShutdown ? '#e03131' : '#ced4da',
                        position: 'relative',
                        cursor: 'pointer',
                        transition: 'background-color 0.25s'
                      }}
                    >
                      <div style={{
                        width: '46px',
                        height: '46px',
                        borderRadius: '23px',
                        backgroundColor: '#ffffff',
                        position: 'absolute',
                        top: '5px',
                        left: protectiveShutdown ? '59px' : '5px',
                        transition: 'left 0.25s cubic-bezier(0.2, 0.85, 0.32, 1.2)',
                        boxShadow: '0 2px 5px rgba(0,0,0,0.2)'
                      }} />
                    </div>
                  </div>

                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.render(<EVDashboardApp />, document.getElementById('root'));

  </script>
